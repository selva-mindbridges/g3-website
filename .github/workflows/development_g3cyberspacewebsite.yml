name: Build and Deploy Next.js App from Subfolder to Azure

on:
  push:
    branches:
      - development
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: using-app-router-with-typescript/nezox
        run: npm install

      - name: Build Next.js app
        working-directory: using-app-router-with-typescript/nezox
        run: npm run build

      - name: Export static site
        working-directory: using-app-router-with-typescript/nezox
        run: npm run export

      - name: Zip static site
        run: |
          cd using-app-router-with-typescript/nezox/out
          zip -r ../../../app.zip .

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'G3CyberspaceWebsite'
          slot-name: 'Production'
          package: app.zip
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_430EE00D71C14B53891E25A4B895FA9B }}
